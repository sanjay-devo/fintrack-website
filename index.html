<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Modern Finance App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      background-color: #f3f4f6;
      color-scheme: light dark;
    }
    .dark body {
      background-color: #030712;
    }

    * {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }
    button,
    input {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }

    button:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.18);
    }

    .soft-card {
      background-color: rgba(255,255,255,0.88);
      border: 1px solid rgba(229,231,235,0.85);
      backdrop-filter: blur(10px);
    }
    .dark .soft-card {
      background-color: rgba(15,23,42,0.92);
      border-color: rgba(51,65,85,0.92);
    }

    /* Page Transitions */
    .page-transition {
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page-hidden {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
    }
    .page-active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
      position: relative;
      z-index: 10;
      height: 100%;
    }

    /* Scrollbar Hidden */
    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen sm:py-6">

  <div class="w-full max-w-md bg-gray-50 dark:bg-gray-900 h-[100dvh] sm:h-auto sm:min-h-[850px] sm:rounded-[2.5rem] sm:shadow-2xl sm:border-[8px] border-gray-800 dark:border-gray-800 overflow-hidden relative flex flex-col mx-auto">

    <div id="dashboard" class="page-transition page-active flex flex-col p-6 h-full overflow-hidden relative">
      
      <header class="flex justify-between items-center mb-6 pt-2 shrink-0 z-20">
        <div>
          <p class="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wider mb-1">Overview</p>
          <h2 class="font-bold text-2xl text-gray-800 dark:text-white leading-none">My Finances</h2>
        </div>
        
        <button onclick="toggleTheme()" class="w-11 h-11 rounded-full bg-white dark:bg-gray-800 shadow-sm flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-300 active:scale-90 border border-gray-200 dark:border-gray-700">
          <svg id="icon-moon" class="w-5 h-5 transition-opacity duration-300" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
          <svg id="icon-sun" class="w-6 h-6 hidden transition-opacity duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
      </header>

      <div class="shrink-0 bg-gradient-to-br from-indigo-600 to-indigo-800 dark:from-indigo-900 dark:to-gray-800 rounded-[24px] p-6 text-white shadow-xl dark:shadow-none mb-6 relative overflow-hidden z-20">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>

        <p class="text-indigo-100 text-sm font-medium mb-1 relative z-10 opacity-90">Total Balance</p>
        <h1 class="text-4xl font-extrabold tracking-tight relative z-10 mb-6" id="totalBalance">₹ 0</h1>
        
        <div class="grid grid-cols-2 gap-4 pt-5 border-t border-white/20 relative z-10">
          <div class="rounded-[24px] bg-white/10 p-4">
            <p class="text-[10px] uppercase tracking-widest text-red-100/90">Today expense</p>
            <p class="mt-3 text-3xl font-extrabold text-red-100 leading-none" id="todayExpense">₹ 0</p>
            <p class="mt-3 text-[11px] text-indigo-100/70">Total: <span id="totalExpense" class="font-semibold text-indigo-100">₹ 0</span></p>
          </div>
          <div class="rounded-[24px] bg-white/10 p-4">
            <p class="text-[10px] uppercase tracking-widest text-green-100/90">Today income</p>
            <p class="mt-3 text-3xl font-extrabold text-green-100 leading-none" id="todayIncome">₹ 0</p>
            <p class="mt-3 text-[11px] text-indigo-100/70">Total: <span id="totalIncome" class="font-semibold text-indigo-100">₹ 0</span></p>
          </div>
        </div>
      </div>

      <div class="flex gap-4 mb-6 shrink-0 z-20">
        <button onclick="openAddPage('expense')" class="flex-1 bg-indigo-600 text-white shadow-lg border border-transparent py-3.5 rounded-2xl font-semibold flex justify-center items-center gap-2 hover:bg-indigo-700 active:scale-95 transition-all duration-200">
          <div class="bg-white/15 text-white p-1.5 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4"></path></svg>
          </div>
          Expense
        </button>

        <button onclick="openAddPage('income')" class="flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 py-3.5 rounded-2xl font-semibold flex justify-center items-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all duration-200 active:scale-95">
          <div class="bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 p-1.5 rounded-full">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
          </div>
          Income
        </button>
      </div>

      <div class="flex justify-between items-center mb-3 shrink-0 z-20">
        <h3 class="text-lg font-bold text-gray-800 dark:text-white">Recent Activity</h3>
      </div>

      <div class="flex-1 overflow-y-auto no-scrollbar pb-24 z-10 relative">
        <ul id="activityList" class="space-y-4"></ul>
      </div>

      <button onclick="openAddPage('expense')" class="absolute bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_8px_20px_rgba(79,70,229,0.5)] flex items-center justify-center hover:bg-indigo-700 active:scale-90 active:shadow-sm transition-all duration-200 z-[60]">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
      </button>

    </div>


    <div id="addPage" class="page-transition page-hidden h-full flex flex-col bg-gray-50 dark:bg-gray-900 absolute top-0 left-0 w-full z-[80]">
      
      <header class="p-6 flex items-center border-b border-gray-200/60 dark:border-gray-800 pt-8 sm:pt-6 shrink-0 bg-white dark:bg-gray-900 z-10 shadow-sm">
        <button onclick="togglePage('dashboard')" class="p-2 -ml-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 transition active:scale-90">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h2 class="font-bold text-lg text-center flex-1 pr-6 text-gray-800 dark:text-white">New Transaction</h2>
      </header>

      <div class="p-6 space-y-6 flex-1 overflow-y-auto no-scrollbar bg-gray-50 dark:bg-gray-900">
        
        <div class="flex bg-gray-200/80 dark:bg-gray-800 p-1.5 rounded-2xl">
          <button id="btnExpense" onclick="setTransactionType('expense')" class="flex-1 py-3.5 text-sm font-bold rounded-xl transition-all">Expense</button>
          <button id="btnIncome" onclick="setTransactionType('income')" class="flex-1 py-3.5 text-sm font-bold rounded-xl transition-all">Income</button>
        </div>
        <input type="hidden" id="txType" value="expense">

        <div class="bg-white dark:bg-gray-800 p-6 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700/50">
          <label class="block text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Amount (₹)</label>
          <input id="amount" type="number" inputmode="decimal" placeholder="0" class="w-full text-5xl font-extrabold text-gray-800 dark:text-white placeholder-gray-300 dark:placeholder-gray-600 border-none outline-none focus:ring-0 p-0 bg-transparent mb-6">
          
          <div class="h-px bg-gray-100 dark:bg-gray-700 w-full mb-6"></div>

          <label class="block text-xs font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-2">Description (Optional)</label>
          <input id="title" type="text" placeholder="What was this for?" class="w-full text-xl font-medium text-gray-800 dark:text-white placeholder-gray-300 dark:placeholder-gray-600 border-none outline-none focus:ring-0 p-0 bg-transparent mb-4">
          
          <div id="suggestionsContainer" class="flex flex-wrap gap-2 mt-2"></div>
        </div>

        <div class="pt-4 pb-8">
          <button onclick="addTransaction()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(79,70,229,0.3)] dark:shadow-none transition-all active:scale-[0.98] text-lg">
            Save Transaction
          </button>
        </div>

      </div>
    </div>

    <div id="customModal" class="fixed inset-0 bg-gray-900/60 dark:bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
      <div id="modalBox" class="bg-white dark:bg-gray-800 w-10/12 max-w-sm rounded-[24px] p-6 shadow-2xl transform scale-95 transition-transform duration-300">
        <h3 id="modalTitle" class="text-xl font-extrabold text-gray-800 dark:text-white mb-2">Notice</h3>
        <p id="modalMessage" class="text-gray-500 dark:text-gray-300 text-sm mb-8 leading-relaxed font-medium"></p>
        
        <div class="flex gap-3 justify-end">
          <button id="btnModalCancel" onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-gray-600 dark:text-gray-300 font-bold bg-gray-100 dark:bg-gray-700 active:scale-95 transition">Cancel</button>
          <button id="btnModalConfirm" class="px-5 py-2.5 rounded-xl text-white font-bold shadow-md active:scale-95 transition">OK</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // --- Data Initialization & Safety ---
    let transactions = [];
    try {
      const data = localStorage.getItem('finance_data');
      if (data) transactions = JSON.parse(data);
    } catch (e) {
      console.error("Local storage parse error:", e);
      transactions = [];
    }

    const saveToLocalStorage = () => {
      try {
        localStorage.setItem('finance_data', JSON.stringify(transactions));
      } catch(e) { console.error("Error saving data:", e); }
    };
    
    const getTodayString = () => new Date().toISOString().split('T')[0];

    const suggestions = {
      expense: ["Food", "Transport", "Bills", "Groceries", "Shopping", "Health"],
      income: ["Salary", "Freelance", "Business", "Gift", "Refund", "Other"]
    };
    let activeSuggestion = null;

    // --- Custom Modal Logic ---
    let modalConfirmAction = null;

    function showModal(title, message, isConfirm, btnColorClass, btnText, callback) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMessage').innerText = message;
      
      const btnCancel = document.getElementById('btnModalCancel');
      const btnConfirm = document.getElementById('btnModalConfirm');

      btnConfirm.className = `px-5 py-2.5 rounded-xl text-white font-bold shadow-md active:scale-95 transition ${btnColorClass}`;
      btnConfirm.innerText = btnText;
      btnCancel.style.display = isConfirm ? 'block' : 'none';
      
      modalConfirmAction = callback;

      const modal = document.getElementById('customModal');
      const modalBox = document.getElementById('modalBox');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-95');
      modalBox.classList.add('scale-100');
    }

    function closeModal() {
      const modal = document.getElementById('customModal');
      const modalBox = document.getElementById('modalBox');
      modal.classList.add('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-100');
      modalBox.classList.add('scale-95');
      modalConfirmAction = null; 
    }

    document.getElementById('btnModalConfirm').onclick = function() {
      if (modalConfirmAction) modalConfirmAction();
      closeModal();
    };

    // --- Theme Management ---
    function updateThemeUI(isDark) {
      document.getElementById('icon-moon').style.display = isDark ? 'none' : 'block';
      document.getElementById('icon-sun').style.display = isDark ? 'block' : 'none';
    }

    function toggleTheme() {
      const htmlEl = document.documentElement;
      htmlEl.classList.toggle('dark');
      const isDark = htmlEl.classList.contains('dark');
      try {
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      } catch(e) {}
      updateThemeUI(isDark);
    }

    function initTheme() {
      let isDark = false;
      try {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      } catch(e) {}

      if (isDark) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      
      updateThemeUI(isDark);
    }

    // --- Core Logic ---
    const formatCurrency = (amount) => {
      try {
        return new Intl.NumberFormat('en-IN', {
          style: 'currency', currency: 'INR', maximumFractionDigits: 0
        }).format(amount).replace('₹', '₹ ');
      } catch(e) {
        return '₹ ' + amount;
      }
    };

    const formatTransactionDate = (dateStr) => {
      const today = new Date();
      const txDate = new Date(dateStr + 'T00:00:00');
      const diffDays = Math.round((today - txDate) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      return new Intl.DateTimeFormat('en-IN', { month: 'short', day: 'numeric' }).format(txDate);
    };

    function deleteTransaction(id) {
      showModal(
        "Delete Record", 
        "Are you sure you want to delete this transaction?", 
        true, 
        "bg-red-500", 
        "Delete", 
        () => {
          transactions = transactions.filter(tx => tx.id !== id);
          saveToLocalStorage();
          renderApp();
        }
      );
    }

    function renderApp() {
      const todayStr = getTodayString();
      let totalBal = 0, totalInc = 0, totalExp = 0, todayInc = 0, todayExp = 0;
      const activityList = document.getElementById("activityList");
      
      activityList.innerHTML = "";

      if(transactions.length === 0) {
        activityList.innerHTML = `
          <div class="flex flex-col items-center justify-center py-10 px-4 text-center opacity-90">
            <div class="w-20 h-20 bg-gray-200/70 dark:bg-gray-800 rounded-full flex items-center justify-center mb-4 shadow-inner">
              <svg class="w-10 h-10 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            </div>
            <p class="text-gray-700 dark:text-gray-200 font-bold text-lg">Nothing tracked yet</p>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 max-w-[220px]">Add your first transaction to start seeing your daily spending and income in one place.</p>
          </div>
        `;
      }

      // Sort newest to oldest
      const sortedTxs = [...transactions].sort((a, b) => b.id - a.id);

      sortedTxs.forEach(tx => {
        const isToday = (tx.dateStr === todayStr);

        if (tx.type === "income") {
          totalInc += tx.amount;
          totalBal += tx.amount;
          if (isToday) todayInc += tx.amount;
        } else {
          totalExp += tx.amount;
          totalBal -= tx.amount;
          if (isToday) todayExp += tx.amount;
        }

        const isIncome = tx.type === "income";
        const iconColor = isIncome ? "text-green-500 bg-green-100 dark:bg-green-900/30" : "text-red-500 bg-red-100 dark:bg-red-900/30";
        const iconSvg = isIncome 
          ? `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>`
          : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>`;
        
        const sign = isIncome ? "+" : "-";
        const amountColor = isIncome ? "text-green-600 dark:text-green-400" : "text-gray-900 dark:text-gray-100";
        const dateDisplay = formatTransactionDate(tx.dateStr);

        const li = document.createElement("li");
        li.className = "bg-white/95 dark:bg-gray-800 border border-gray-200/80 dark:border-gray-700/80 shadow-sm rounded-3xl p-4 flex items-center justify-between gap-4 hover:-translate-y-0.5 transition-transform";
        li.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${iconColor} shrink-0">
              ${iconSvg}
            </div>
            <div>
              <h4 class="font-bold text-gray-800 dark:text-gray-100 text-sm">${tx.title}</h4>
              <p class="mt-1 text-[11px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider">${dateDisplay}</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <div class="font-extrabold text-xl ${amountColor} tracking-tight">${sign}${formatCurrency(tx.amount)}</div>
            <button onclick="deleteTransaction(${tx.id})" class="p-2 -mr-2 text-gray-400 dark:text-gray-500 border border-transparent rounded-full hover:text-red-500 hover:border-red-200 dark:hover:border-red-700/50 hover:bg-red-50 dark:hover:bg-red-900/30 active:scale-95 transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          </div>
        `;
        activityList.appendChild(li);
      });

      // Update Top Card UI
      document.getElementById("totalBalance").innerText = formatCurrency(totalBal);
      document.getElementById("todayExpense").innerText = formatCurrency(todayExp);
      document.getElementById("totalExpense").innerText = `Total: ${formatCurrency(totalExp)}`;
      document.getElementById("todayIncome").innerText = formatCurrency(todayInc);
      document.getElementById("totalIncome").innerText = `Total: ${formatCurrency(totalInc)}`;
    }

    // --- Page Navigation ---
    function togglePage(pageId) {
      const dashboard = document.getElementById("dashboard");
      const addPage = document.getElementById("addPage");

      if (pageId === "dashboard") {
        dashboard.classList.replace("page-hidden", "page-active");
        addPage.classList.replace("page-active", "page-hidden");
      } else {
        dashboard.classList.replace("page-active", "page-hidden");
        addPage.classList.replace("page-hidden", "page-active");
      }
    }

    function renderSuggestions(type) {
      const container = document.getElementById("suggestionsContainer");
      if(!container) return;
      container.innerHTML = "";
      activeSuggestion = suggestions[type].includes(activeSuggestion) ? activeSuggestion : null;

      (suggestions[type] || []).forEach(tag => {
        const isSelected = activeSuggestion === tag;
        const btn = document.createElement("button");
        btn.className = `px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all ${isSelected ? 'bg-indigo-600 text-white shadow-sm' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}`;
        btn.innerText = tag;
        btn.onclick = () => {
          document.getElementById("title").value = tag;
          activeSuggestion = tag;
          renderSuggestions(type);
        };
        container.appendChild(btn);
      });
    }

    function setTransactionType(type) {
      document.getElementById("txType").value = type;
      renderSuggestions(type);
      
      const btnIncome = document.getElementById("btnIncome");
      const btnExpense = document.getElementById("btnExpense");

      const expenseActive = "flex-1 py-3.5 text-sm font-semibold rounded-xl bg-red-600 text-white shadow-sm shadow-red-600/20 transition-all";
      const incomeActive = "flex-1 py-3.5 text-sm font-semibold rounded-xl bg-emerald-600 text-white shadow-sm shadow-emerald-600/20 transition-all";
      const inactiveStyle = "flex-1 py-3.5 text-sm font-semibold rounded-xl text-gray-500 dark:text-gray-400 bg-transparent transition-all";

      if (type === "expense") {
        btnExpense.className = expenseActive;
        btnIncome.className = inactiveStyle;
      } else {
        btnIncome.className = incomeActive;
        btnExpense.className = inactiveStyle;
      }
    }

    function openAddPage(type) {
      activeSuggestion = null;
      setTransactionType(type);
      document.getElementById("amount").value = "";
      document.getElementById("title").value = "";
      togglePage('addPage');
      setTimeout(() => { document.getElementById("amount").focus(); }, 350);
    }

    function addTransaction() {
      let title = document.getElementById("title").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      const type = document.getElementById("txType").value;

      if (isNaN(amount) || amount <= 0) {
        showModal("Invalid Amount", "Please enter an amount greater than 0.", false, "bg-indigo-600", "Got it", null);
        return;
      }

      // Auto-fill description if left blank
      if (!title) {
        title = (type === 'expense') ? 'Expense' : 'Income';
      }

      activeSuggestion = null;
      transactions.push({
        id: Date.now(),
        title: title,
        amount: amount,
        type: type,
        dateStr: getTodayString()
      });

      saveToLocalStorage();
      renderApp();
      togglePage("dashboard");
    }

    // --- On Load ---
    initTheme();
    renderApp();
  </script>
</body>
</html>
