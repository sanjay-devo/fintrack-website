<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FinTrack Dashboard</title>
  <link rel="icon" type="image/jpeg" href="https://indiacybercafe.com/wp-content/uploads/2026/04/Fintech_logo_design.jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      background-color: #f3f4f6;
      color-scheme: light dark;
    }
    .dark body {
      background-color: #030712;
    }

    * {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }
    button,
    input {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }
    button:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.18);
    }

    .soft-card {
      background-color: rgba(255,255,255,0.88);
      border: 1px solid rgba(229,231,235,0.85);
      backdrop-filter: blur(10px);
    }
    .dark .soft-card {
      background-color: rgba(15,23,42,0.92);
      border-color: rgba(51,65,85,0.92);
    }

    .password-input-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      color: #0f172a;
    }
    .dark .password-toggle {
      color: #ffffff;
    }
    .password-toggle svg {
      display: block;
    }

    .dashboard-header {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(226,232,240,0.65);
    }
    .dark .dashboard-header {
      background: rgba(15,23,42,0.82);
      border-color: rgba(71,85,105,0.55);
    }

    .page-transition {
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .page-hidden {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
    }
    .page-active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
      position: relative;
      z-index: 10;
      height: 100%;
    }

    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen">
  <div class="w-full lg:max-w-[1200px] bg-gray-50 dark:bg-gray-900 min-h-[100dvh] sm:min-h-[850px] sm:rounded-[2.5rem] sm:shadow-2xl overflow-hidden relative flex flex-col mx-auto px-4 sm:px-6 lg:px-8">
    <div id="dashboard" class="page-transition page-hidden flex flex-col p-4 sm:p-6 lg:p-10 h-full overflow-hidden relative">
      <header class="dashboard-header flex items-center justify-between gap-3 sm:flex-row mb-6 sm:mb-8 p-4 sm:p-5 lg:p-6 rounded-[28px] shadow-sm z-20">
        <div class="flex-1 min-w-0">
          <p id="welcomeMessage" class="font-bold text-2xl sm:text-3xl lg:text-4xl text-gray-900 dark:text-white leading-tight whitespace-nowrap">
            Hello,&nbsp;<span id="welcomeNameInitial" class="sm:hidden"></span><span id="welcomeNameFull" class="hidden sm:inline"></span>
          </p>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-sm flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-300 active:scale-90 border border-gray-200 dark:border-gray-700">
            <svg id="icon-moon" class="w-5 h-5 transition-opacity duration-300" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg id="icon-sun" class="w-6 h-6 hidden transition-opacity duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          </button>
          <button onclick="logout()" class="hidden sm:inline-flex items-center justify-center px-4 h-10 rounded-full bg-white dark:bg-gray-800 shadow-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all duration-300 active:scale-90 border border-gray-200 dark:border-gray-700">
            Logout
          </button>
        </div>
      </header>

      <div class="shrink-0 bg-gradient-to-br from-indigo-600 to-indigo-800 dark:from-indigo-900 dark:to-gray-800 rounded-[24px] p-4 sm:p-6 text-white shadow-xl dark:shadow-none mb-6 relative overflow-hidden z-20">
        <div class="absolute -right-6 -top-6 w-28 h-28 sm:w-32 sm:h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>

        <p class="text-indigo-100 text-xs sm:text-sm font-medium mb-1 relative z-10 opacity-90">Total Balance</p>
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight relative z-10 mb-5" id="totalBalance"> 0</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-4 sm:pt-5 border-t border-white/20 relative z-10">
          <div class="rounded-[24px] bg-white/10 p-4 sm:p-5">
            <p class="text-[10px] uppercase tracking-widest text-red-100/90">Today expense</p>
            <p class="mt-3 text-2xl sm:text-3xl font-extrabold text-red-100 leading-none" id="todayExpense"> 0</p>
            <p class="mt-3 text-[11px] text-indigo-100/70">Total: <span id="totalExpense" class="font-semibold text-indigo-100"> 0</span></p>
          </div>
          <div class="rounded-[24px] bg-white/10 p-4 sm:p-5">
            <p class="text-[10px] uppercase tracking-widest text-green-100/90">Today income</p>
            <p class="mt-3 text-2xl sm:text-3xl font-extrabold text-green-100 leading-none" id="todayIncome"> 0</p>
            <p class="mt-3 text-[11px] text-indigo-100/70">Total: <span id="totalIncome" class="font-semibold text-indigo-100"> 0</span></p>
          </div>
        </div>
      </div>

      <div class="flex flex-col gap-3 mb-6 shrink-0 z-20 sm:flex-row">
        <button onclick="openAddPage('expense')" class="w-full flex-1 bg-indigo-600 text-white shadow-lg border border-transparent py-3.5 rounded-2xl font-semibold flex justify-center items-center gap-2 hover:bg-indigo-700 active:scale-95 transition-all duration-200">
          <div class="bg-white/15 text-white p-1.5 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20 12H4"></path></svg>
          </div>
          Expense
        </button>
        <button onclick="openAddPage('income')" class="w-full flex-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-200 py-3.5 rounded-2xl font-semibold flex justify-center items-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all duration-200 active:scale-95">
          <div class="bg-gray-100 dark:bg-gray-700 p-1.5 rounded-full">
            <svg class="w-5 h-5 text-gray-700 dark:text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 5v14m7-7H5"></path></svg>
          </div>
          Income
        </button>
      </div>

      <div class="flex justify-between items-center mb-3 shrink-0 z-20">
        <h3 class="text-lg font-bold text-gray-800 dark:text-white">Recent Activity</h3>
      </div>

      <div class="flex-1 overflow-y-auto no-scrollbar pb-24 z-10 relative">
        <ul id="activityList" class="space-y-4"></ul>
      </div>

      <button onclick="openAddPage('expense')" class="absolute bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_8px_20px_rgba(79,70,229,0.5)] flex items-center justify-center hover:bg-indigo-700 active:scale-90 active:shadow-sm transition-all duration-200 z-[60]">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
      </button>
    </div>

    <div id="addPage" class="page-transition page-hidden h-full flex flex-col bg-gray-50 dark:bg-gray-900 absolute top-0 left-0 w-full z-[80]">
      <header class="p-4 sm:p-6 flex items-center border-b border-gray-200/60 dark:border-gray-800 pt-6 sm:pt-6 shrink-0 bg-white dark:bg-gray-900 z-10 shadow-sm">
        <button onclick="togglePage('dashboard')" class="p-2 -ml-2 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 transition active:scale-90">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h2 class="font-bold text-lg text-center flex-1 pr-6 text-gray-800 dark:text-white">New Transaction</h2>
      </header>

      <div class="p-6 space-y-6 flex-1 overflow-y-auto no-scrollbar bg-gray-50 dark:bg-gray-900">
        <div class="flex bg-gray-200/80 dark:bg-gray-800 p-1.5 rounded-2xl">
          <button id="btnExpense" type="button" onclick="setTransactionType('expense')" class="flex-1 py-3.5 text-sm font-semibold rounded-xl bg-red-600 text-white shadow-sm shadow-red-600/20 transition-all">Expense</button>
          <button id="btnIncome" type="button" onclick="setTransactionType('income')" class="flex-1 py-3.5 text-sm font-semibold rounded-xl text-gray-500 dark:text-gray-400 bg-transparent transition-all">Income</button>
        </div>
        <input type="hidden" id="txType" value="expense">

        <div class="bg-white dark:bg-gray-800 p-6 rounded-[24px] shadow-sm border border-gray-100 dark:border-gray-700/50">
          <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-3">Title</label>
          <input id="title" type="text" placeholder="Add a title" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-gray-900 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
          <label class="mt-5 block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-3">Amount</label>
          <input id="amount" type="number" placeholder="0" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-gray-900 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
          <div id="suggestionsContainer" class="mt-4 flex flex-wrap gap-2"></div>
        </div>

        <div class="pt-4 pb-8">
          <button onclick="addTransaction()" class="w-full rounded-3xl bg-indigo-600 text-white py-3.5 text-sm font-semibold shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 transition active:scale-95">Save transaction</button>
        </div>
      </div>
    </div>

    <div id="customModal" class="fixed inset-0 bg-gray-900/60 dark:bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
      <div id="modalBox" class="bg-white dark:bg-gray-800 w-10/12 max-w-sm rounded-[24px] p-6 shadow-2xl transform scale-95 transition-transform duration-300">
        <h3 id="modalTitle" class="text-xl font-extrabold text-gray-800 dark:text-white mb-2">Notice</h3>
        <p id="modalMessage" class="text-gray-500 dark:text-gray-300 text-sm mb-8 leading-relaxed font-medium"></p>
        <div class="flex gap-3 justify-end">
          <button id="btnModalCancel" onclick="closeModal()" class="px-5 py-2.5 rounded-xl text-gray-600 dark:text-gray-200 border border-gray-200 dark:border-gray-700 transition hover:bg-gray-100 dark:hover:bg-gray-800">Cancel</button>
          <button id="btnModalConfirm" class="px-5 py-2.5 rounded-xl text-white font-bold shadow-md bg-indigo-600">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const FIREBASE_BASE = 'https://fintrack-website-default-rtdb.firebaseio.com/';
    const AUTH_STORAGE_KEY = 'fintrack_user';
    let currentUser = null;
    let transactions = [];
    let activeSuggestion = null;

    const normalizeUserId = (value) => {
      return value.trim().toLowerCase().replace(/[@.#$\[\]\/]/g, '_');
    };

    const getUserRefUrl = (userId) => {
      return `${FIREBASE_BASE}users/${encodeURIComponent(normalizeUserId(userId))}.json`;
    };

    const getUserTransactionsUrl = (userId) => {
      return `${FIREBASE_BASE}users/${encodeURIComponent(normalizeUserId(userId))}/transactions.json`;
    };

    const getTransactionRefUrl = (userId, transactionId) => {
      return `${FIREBASE_BASE}users/${encodeURIComponent(normalizeUserId(userId))}/transactions/${encodeURIComponent(transactionId)}.json`;
    };

    const saveSession = (user) => {
      localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(user));
    };

    const getSession = () => {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    };

    const clearSession = () => {
      localStorage.removeItem(AUTH_STORAGE_KEY);
    };

    const getTodayString = () => new Date().toISOString().split('T')[0];

    const suggestions = {
      expense: ["Food", "Transport", "Bills", "Groceries", "Shopping", "Health"],
      income: ["Salary", "Freelance", "Business", "Gift", "Refund", "Other"]
    };

    const redirectToLogin = () => {
      clearSession();
      history.replaceState({ page: 'login' }, '', 'login.html');
      window.location.replace('login.html');
    };

    const ensureAuthenticated = () => {
      if (!currentUser || !currentUser.id) {
        redirectToLogin();
        return false;
      }
      return true;
    };

    const fetchUserTransactions = async () => {
      if (!currentUser) return [];
      const response = await fetch(getUserTransactionsUrl(currentUser.id));
      if (!response.ok) {
        throw new Error('Unable to load transactions');
      }
      const data = await response.json();
      if (!data) return [];
      return Object.entries(data).map(([id, tx]) => ({
        id: /^\d+$/.test(id) ? Number(id) : id,
        ...tx
      }));
    };

    const saveTransactionToFirebase = async (transaction) => {
      if (!ensureAuthenticated()) throw new Error('No authenticated user');
      const response = await fetch(getTransactionRefUrl(currentUser.id, transaction.id), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(transaction)
      });
      if (!response.ok) {
        throw new Error('Unable to save transaction');
      }
      return response.json();
    };

    const deleteTransactionFromFirebase = async (transactionId) => {
      if (!ensureAuthenticated()) throw new Error('No authenticated user');
      const response = await fetch(getTransactionRefUrl(currentUser.id, transactionId), {
        method: 'DELETE'
      });
      if (!response.ok) {
        throw new Error('Unable to delete transaction');
      }
      return response.json();
    };

    const updateWelcomeMessage = () => {
      const welcomeInitial = document.getElementById('welcomeNameInitial');
      const welcomeFull = document.getElementById('welcomeNameFull');
      if (!currentUser || !welcomeInitial || !welcomeFull) return;
      const name = currentUser.name.trim();
      const firstWord = name.split(' ')[0] || '';
      welcomeInitial.textContent = firstWord;
      welcomeFull.textContent = name;
    };

    const showDashboard = () => {
      const dashboard = document.getElementById('dashboard');
      const addPage = document.getElementById('addPage');
      dashboard.classList.replace('page-hidden', 'page-active');
      addPage.classList.replace('page-active', 'page-hidden');
      history.replaceState({ page: 'dashboard' }, '', 'index.html');
    };

    const showAddPage = () => {
      const dashboard = document.getElementById('dashboard');
      const addPage = document.getElementById('addPage');
      dashboard.classList.replace('page-active', 'page-hidden');
      addPage.classList.replace('page-hidden', 'page-active');
    };

    const togglePage = (pageId) => {
      if (pageId === 'dashboard') {
        showDashboard();
      } else if (pageId === 'addPage') {
        showAddPage();
        history.pushState({ page: 'add' }, '', '#add');
      }
    };

    const showModal = (title, message, isConfirm, btnColorClass, btnText, callback) => {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMessage').innerText = message;
      const btnCancel = document.getElementById('btnModalCancel');
      const btnConfirm = document.getElementById('btnModalConfirm');
      btnConfirm.className = `px-5 py-2.5 rounded-xl text-white font-bold shadow-md active:scale-95 transition ${btnColorClass}`;
      btnConfirm.innerText = btnText;
      btnCancel.style.display = isConfirm ? 'block' : 'none';
      window.modalConfirmAction = callback;
      const modal = document.getElementById('customModal');
      const modalBox = document.getElementById('modalBox');
      modal.classList.remove('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-95');
      modalBox.classList.add('scale-100');
    };

    const closeModal = () => {
      const modal = document.getElementById('customModal');
      const modalBox = document.getElementById('modalBox');
      modal.classList.add('opacity-0', 'pointer-events-none');
      modalBox.classList.remove('scale-100');
      modalBox.classList.add('scale-95');
      window.modalConfirmAction = null;
    };

    const deleteTransaction = (id) => {
      if (!ensureAuthenticated()) return;
      showModal(
        'Delete Record',
        'Are you sure you want to delete this transaction?',
        true,
        'bg-red-500',
        'Delete',
        async () => {
          try {
            await deleteTransactionFromFirebase(id);
            transactions = transactions.filter(tx => tx.id !== id);
            renderApp();
          } catch (e) {
            showModal('Unable to delete', 'Unable to delete transaction. Please try again.', false, 'bg-indigo-600', 'OK', null);
          }
        }
      );
    };

    const renderApp = () => {
      const todayStr = getTodayString();
      let totalBal = 0, totalInc = 0, totalExp = 0, todayInc = 0, todayExp = 0;
      const activityList = document.getElementById('activityList');
      activityList.innerHTML = '';

      const sortedTxs = [...transactions].sort((a, b) => b.id - a.id);
      if (sortedTxs.length === 0) {
        activityList.innerHTML = '<li class="text-center text-sm text-slate-500 dark:text-slate-400 py-8">No transactions yet.</li>';
      }

      sortedTxs.forEach(tx => {
        const isToday = tx.dateStr === todayStr;
        if (tx.type === 'income') {
          totalInc += tx.amount;
          if (isToday) todayInc += tx.amount;
        } else {
          totalExp += tx.amount;
          if (isToday) todayExp += tx.amount;
        }
        totalBal += tx.type === 'income' ? tx.amount : -tx.amount;

        const isIncome = tx.type === 'income';
        const iconColor = isIncome ? 'text-green-500 bg-green-100 dark:bg-green-900/30' : 'text-red-500 bg-red-100 dark:bg-red-900/30';
        const iconSvg = isIncome
          ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c1.657 0 3 1.343 3 3v7h3l-4 4-4-4h3v-7c0-1.657 1.343-3 3-3z"></path>'
          : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16c-1.657 0-3-1.343-3-3V6H6l4-4 4 4h-3v7c0 1.657-1.343 3-3 3z"></path>';
        const sign = isIncome ? '+' : '-';
        const amountColor = isIncome ? 'text-green-600 dark:text-green-400' : 'text-gray-900 dark:text-gray-100';
        const dateDisplay = formatTransactionDate(tx.dateStr);

        const li = document.createElement('li');
        li.className = 'bg-white/95 dark:bg-gray-800 border border-gray-200/80 dark:border-gray-700/80 shadow-sm rounded-3xl p-4 flex items-center justify-between gap-4 hover:-translate-y-0.5 transition-transform';
        li.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="${iconColor} rounded-2xl p-3"> <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${iconSvg}</svg> </div>
            <div>
              <p class="font-semibold text-gray-900 dark:text-white">${tx.title}</p>
              <p class="text-[11px] uppercase tracking-[0.24em] text-slate-400 dark:text-slate-500">${dateDisplay}</p>
            </div>
          </div>
          <div class="text-right">
            <p class="font-bold ${amountColor}">${sign}  ${tx.amount.toLocaleString('en-IN')}</p>
            <button onclick="deleteTransaction('${tx.id}')" class="mt-2 text-xs text-red-500 hover:text-red-600">Delete</button>
          </div>
        `;
        activityList.appendChild(li);
      });

      document.getElementById('totalBalance').innerText = formatCurrency(totalBal);
      document.getElementById('todayExpense').innerText = formatCurrency(todayExp);
      document.getElementById('totalExpense').innerText = formatCurrency(totalExp);
      document.getElementById('todayIncome').innerText = formatCurrency(todayInc);
      document.getElementById('totalIncome').innerText = formatCurrency(totalInc);
    };

    const formatCurrency = (amount) => {
      try {
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount).replace('', ' ');
      } catch (e) {
        return ' ' + amount;
      }
    };

    const formatTransactionDate = (dateStr) => {
      const today = new Date();
      const txDate = new Date(dateStr + 'T00:00:00');
      const diffDays = Math.round((today - txDate) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      return new Intl.DateTimeFormat('en-IN', { month: 'short', day: 'numeric' }).format(txDate);
    };

    const renderSuggestions = (type) => {
      const container = document.getElementById('suggestionsContainer');
      if (!container) return;
      container.innerHTML = '';
      activeSuggestion = suggestions[type].includes(activeSuggestion) ? activeSuggestion : null;
      (suggestions[type] || []).forEach(tag => {
        const isSelected = activeSuggestion === tag;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all ${isSelected ? 'bg-indigo-600 text-white shadow-sm' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'}`;
        btn.innerText = tag;
        btn.onclick = () => {
          activeSuggestion = tag;
          document.getElementById('title').value = tag;
          renderSuggestions(type);
        };
        container.appendChild(btn);
      });
    };

    const setTransactionType = (type) => {
      document.getElementById('txType').value = type;
      renderSuggestions(type);
      const btnIncome = document.getElementById('btnIncome');
      const btnExpense = document.getElementById('btnExpense');
      const expenseActive = 'flex-1 py-3.5 text-sm font-semibold rounded-xl bg-red-600 text-white shadow-sm shadow-red-600/20 transition-all';
      const incomeActive = 'flex-1 py-3.5 text-sm font-semibold rounded-xl bg-emerald-600 text-white shadow-sm shadow-emerald-600/20 transition-all';
      const inactiveStyle = 'flex-1 py-3.5 text-sm font-semibold rounded-xl text-gray-500 dark:text-gray-400 bg-transparent transition-all';
      if (type === 'expense') {
        btnExpense.className = expenseActive;
        btnIncome.className = inactiveStyle;
      } else {
        btnIncome.className = incomeActive;
        btnExpense.className = inactiveStyle;
      }
    };

    const openAddPage = (type) => {
      if (!ensureAuthenticated()) return;
      activeSuggestion = null;
      setTransactionType(type);
      document.getElementById('amount').value = '';
      document.getElementById('title').value = '';
      togglePage('addPage');
      setTimeout(() => { document.getElementById('amount').focus(); }, 350);
    };

    const addTransaction = async () => {
      if (!ensureAuthenticated()) return;
      let title = document.getElementById('title').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('txType').value;
      if (isNaN(amount) || amount <= 0) {
        showModal('Invalid Amount', 'Please enter an amount greater than 0.', false, 'bg-indigo-600', 'Got it', null);
        return;
      }
      if (!title) {
        title = type === 'expense' ? 'Expense' : 'Income';
      }
      const transaction = {
        id: Date.now(),
        title,
        amount,
        type,
        dateStr: getTodayString()
      };
      try {
        await saveTransactionToFirebase(transaction);
        transactions.push(transaction);
        renderApp();
        togglePage('dashboard');
      } catch (e) {
        showModal('Unable to save', 'Unable to save transaction. Please try again.', false, 'bg-indigo-600', 'OK', null);
      }
    };

    const updateThemeUI = (isDark) => {
      document.getElementById('icon-moon').style.display = isDark ? 'none' : 'block';
      document.getElementById('icon-sun').style.display = isDark ? 'block' : 'none';
    };

    const toggleTheme = () => {
      const htmlEl = document.documentElement;
      htmlEl.classList.toggle('dark');
      const isDark = htmlEl.classList.contains('dark');
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
      updateThemeUI(isDark);
    };

    const initTheme = () => {
      let isDark = false;
      try {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      } catch (e) {}
      document.documentElement.classList.toggle('dark', isDark);
      updateThemeUI(isDark);
    };

    const loadTransactions = async () => {
      transactions = [];
      if (!currentUser) return;
      try {
        transactions = await fetchUserTransactions();
      } catch (e) {
        console.error('Error loading transactions:', e);
        transactions = [];
      }
    };

    const logout = () => {
      redirectToLogin();
    };

    const initApp = async () => {
      initTheme();
      const session = getSession();
      if (!session || !session.id) {
        redirectToLogin();
        return;
      }
      currentUser = session;
      updateWelcomeMessage();
      await loadTransactions();
      renderApp();
      showDashboard();
      history.replaceState({ page: 'dashboard' }, '', 'index.html');
    };

    window.addEventListener('popstate', (event) => {
      if (!currentUser || !currentUser.id) {
        redirectToLogin();
        return;
      }
      if (event.state && event.state.page === 'add') {
        showAddPage();
      } else {
        showDashboard();
      }
    });

    document.getElementById('btnModalConfirm').onclick = function () {
      if (window.modalConfirmAction) window.modalConfirmAction();
      closeModal();
    };

    initApp();
  </script>
</body>
</html>
