<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register — FinTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      background-color: #f3f4f6;
      color-scheme: light dark;
    }
    .dark body {
      background-color: #030712;
    }
    * {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }
    button,
    input {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease,
                  box-shadow 0.25s ease, transform 0.2s ease;
    }
    button:focus-visible,
    input:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.18);
    }

    .password-input-wrapper {
      position: relative;
    }
    .password-toggle {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      width: 2.75rem;
      height: 2.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      color: #0f172a;
    }
    .dark .password-toggle {
      color: #ffffff;
    }
    .password-toggle svg {
      display: block;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen sm:py-6">
  <div class="w-full max-w-md bg-white dark:bg-slate-950 border border-slate-200/70 dark:border-slate-800 shadow-2xl rounded-[32px] p-8 space-y-6">
    <div class="space-y-2 text-center">
      <p class="text-[11px] uppercase tracking-[0.32em] text-indigo-500">Create account</p>
      <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Get started</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Register a new account and start tracking your money.</p>
    </div>

    <div id="authError" class="hidden rounded-2xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm"></div>

    <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-5">
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2">Full name</label>
          <input id="registerName" type="text" placeholder="John Doe" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2">Email address</label>
          <input id="registerEmail" type="email" placeholder="name@example.com" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2">Mobile number</label>
          <input id="registerMobile" type="tel" placeholder="9876543210" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2">Password</label>
          <div class="password-input-wrapper">
            <input id="registerPassword" type="password" placeholder="Create password" class="w-full rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-3 pr-14 text-sm text-slate-900 dark:text-white placeholder-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-indigo-500/20 outline-none" />
            <button type="button" id="registerPasswordToggle" onclick="togglePasswordVisibility('registerPassword','registerPasswordToggle')" aria-label="Show password" title="Show password" class="password-toggle transition-colors hover:text-slate-700 dark:hover:text-white">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            </button>
          </div>
        </div>
      </div>
      <button type="submit" class="w-full rounded-3xl bg-slate-900 text-white py-3 text-sm font-semibold shadow-lg shadow-slate-900/15 hover:bg-slate-800 transition">Create account</button>
    </form>

    <p class="text-center text-sm text-slate-500 dark:text-slate-400">Already have an account? <a href="login.html" class="font-semibold text-indigo-600 hover:text-indigo-700">Login</a></p>
  </div>

  <script>
    const FIREBASE_BASE = 'https://fintrack-website-default-rtdb.firebaseio.com/';
    const AUTH_STORAGE_KEY = 'fintrack_user';

    const normalizeUserId = (value) => {
      return value.trim().toLowerCase().replace(/[@.#$\[\]\/]/g, '_');
    };

    const getUserRefUrl = (userId) => {
      return `${FIREBASE_BASE}users/${encodeURIComponent(normalizeUserId(userId))}.json`;
    };

    const normalizeMobile = (value) => {
      return value.replace(/\D/g, '');
    };

    const validateEmail = (email) => {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
    };

    const validateMobile = (mobile) => {
      const cleaned = normalizeMobile(mobile);
      return /^\d{10}$/.test(cleaned);
    };

    const getEmailIndexUrl = (email) => {
      return `${FIREBASE_BASE}email_index/${encodeURIComponent(normalizeUserId(email))}.json`;
    };

    const getMobileIndexUrl = (mobile) => {
      return `${FIREBASE_BASE}mobile_index/${encodeURIComponent(normalizeMobile(mobile))}.json`;
    };

    const saveSession = (user) => {
      localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(user));
    };

    const getSession = () => {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    };

    const showAuthError = (message) => {
      const authError = document.getElementById('authError');
      if (!message) {
        authError.classList.add('hidden');
        authError.textContent = '';
        return;
      }
      authError.textContent = message;
      authError.classList.remove('hidden');
    };

    const getPasswordToggleIcon = (isVisible) => {
      if (isVisible) {
        return `
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.747-3.191M6.12 6.12A9.97 9.97 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.182 2.78M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`;
      }
      return `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.747-3.191M6.12 6.12A9.97 9.97 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.182 2.78M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`;
    };

    const togglePasswordVisibility = (fieldId, buttonId) => {
      const input = document.getElementById(fieldId);
      const button = document.getElementById(buttonId);
      if (!input || !button) return;
      const isVisible = input.type === 'password';
      input.type = isVisible ? 'text' : 'password';
      button.innerHTML = getPasswordToggleIcon(isVisible);
      button.setAttribute('aria-label', isVisible ? 'Hide password' : 'Show password');
      button.title = isVisible ? 'Hide password' : 'Show password';
    };

    const fetchUserData = async (userId) => {
      const response = await fetch(getUserRefUrl(userId));
      if (!response.ok) {
        throw new Error('Unable to reach authentication server.');
      }
      return response.json();
    };

    const updateTheme = () => {
      let isDark = false;
      try {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      } catch (e) {}
      document.documentElement.classList.toggle('dark', isDark);
    };

    const redirectToDashboard = () => {
      history.replaceState({ page: 'dashboard' }, '', 'index.html');
      window.location.replace('index.html');
    };

    const initAuth = () => {
      updateTheme();
      const session = getSession();
      if (session && session.id) {
        redirectToDashboard();
        return;
      }
      history.replaceState({ page: 'auth' }, '', window.location.href);
      window.addEventListener('popstate', () => {
        const session = getSession();
        if (session && session.id) {
          redirectToDashboard();
        }
      });
    };

    const setCurrentUser = (user) => {
      const sessionUser = {
        id: user.id,
        key: normalizeUserId(user.id),
        name: user.name || user.id
      };
      saveSession(sessionUser);
    };

    const handleRegister = async (event) => {
      event.preventDefault();
      showAuthError('');

      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const mobile = document.getElementById('registerMobile').value.trim();
      const password = document.getElementById('registerPassword').value.trim();

      if (!name || !email || !mobile || !password) {
        showAuthError('Please complete all fields.');
        return;
      }
      if (!validateEmail(email)) {
        showAuthError('Please enter a valid email address.');
        return;
      }
      if (!validateMobile(mobile)) {
        showAuthError('Please enter a valid 10-digit mobile number.');
        return;
      }
      if (password.length < 6) {
        showAuthError('Password must be at least 6 characters long.');
        return;
      }

      const normalizedEmail = normalizeUserId(email);
      const normalizedMobile = normalizeMobile(mobile);
      const userId = normalizedEmail;

      try {
        const [existingEmail, existingMobile] = await Promise.all([
          fetch(getEmailIndexUrl(email)),
          fetch(getMobileIndexUrl(mobile))
        ]);

        const emailIndexValue = existingEmail.ok ? await existingEmail.json() : null;
        const mobileIndexValue = existingMobile.ok ? await existingMobile.json() : null;

        if (emailIndexValue) {
          showAuthError('An account with this email already exists.');
          return;
        }
        if (mobileIndexValue) {
          showAuthError('An account with this mobile number already exists.');
          return;
        }

        const payload = {
          id: userId,
          name,
          email,
          mobile: normalizedMobile,
          password,
          transactions: {}
        };

        const response = await fetch(`${FIREBASE_BASE}.json`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            [`users/${userId}`]: payload,
            [`email_index/${normalizedEmail}`]: userId,
            [`mobile_index/${normalizedMobile}`]: userId
          })
        });

        if (!response.ok) {
          const details = await response.text();
          throw new Error(`Unable to create account. Please try again. ${details || response.statusText}`);
        }

        setCurrentUser(payload);
        redirectToDashboard();
      } catch (error) {
        const message = error.message.includes('Unable to reach') ? 'Unable to reach the authentication server. Please try again later.' : error.message;
        showAuthError(message);
      }
    };

    initAuth();
  </script>
</body>
</html>
